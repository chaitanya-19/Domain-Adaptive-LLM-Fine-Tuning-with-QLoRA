# ============================================================
# Domain-Adaptive LLM Fine-Tuning Configuration
# ============================================================

# --- Model ---
model:
  name: "meta-llama/Llama-3.2-3B-Instruct"
  max_seq_length: 1024

# --- QLoRA / BitsAndBytes ---
quantization:
  load_in_4bit: true
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true

# --- LoRA ---
lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

# --- Dataset ---
dataset:
  name: "medalpaca/medical_meadow_medical_flashcards"
  train_split_ratio: 0.9
  max_samples: 10000  # Set to null for full dataset
  seed: 42

# --- Training ---
training:
  output_dir: "./results/qlora-medical-llama3.2-3b"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  logging_steps: 25
  eval_steps: 100
  save_steps: 200
  save_total_limit: 2
  fp16: false
  bf16: true
  max_grad_norm: 0.3
  optim: "paged_adamw_32bit"
  group_by_length: true
  report_to: "none"

# --- Evaluation ---
evaluation:
  num_samples: 50
  max_new_tokens: 256
  temperature: 0.1
  ragas_llm: "gpt-4o-mini"       # LLM judge for RAGAS
  ragas_embeddings: "text-embedding-3-small"

# --- System Prompt ---
system_prompt: >
  You are a knowledgeable medical assistant. Provide accurate, concise,
  and evidence-based answers to medical questions. If you are unsure,
  state so clearly. Do not provide diagnoses or treatment plans —
  advise consulting a healthcare professional.
